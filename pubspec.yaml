name: astrology_app
description: "A daily horoscope, zodiac prediction, and birth chart astrology app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  http: ^1.2.1
  provider: ^6.1.2
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Uncomment and add assets once you have icons/images:
  # assets:
  #   - assets/images/
  #   - assets/zodiac_icons/
